<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التصنيفات - DriveSymbols DZ</title>
  <meta name="description" content="تصفح رموز لوحة القيادة حسب التصنيف.">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">
        <i class="fas fa-tachometer-alt"></i>
        <span>DriveSymbols DZ</span>
      </a>
      <nav class="nav" id="mainNav">
        <a href="index.html" class="nav-link">الرئيسية</a>
        <a href="search.html" class="nav-link">البحث</a>
        <a href="categories.html" class="nav-link active">التصنيفات</a>
        <a href="about.html" class="nav-link">عن الموقع</a>
        <a href="contact.html" class="nav-link">اتصل بنا</a>
      </nav>
      <div class="header-actions">
        <button class="btn-icon tooltip" data-tooltip="المفضلة" onclick="window.location.href='favorites.html'">
          <i class="fas fa-heart"></i>
        </button>
        <button class="btn-icon tooltip" data-tooltip="الوضع الليلي" id="themeToggle">
          <i class="fas fa-moon"></i>
        </button>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="القائمة">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1><i class="fas fa-layer-group"></i> التصنيفات</h1>
      <p>تصفح الرموز حسب النظام أو الجزء المعني</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="grid grid-3" id="categoriesList">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>© 2024 DriveSymbols DZ. جميع الحقوق محفوظة.</p>
      </div>
    </div>
  </footer>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
    <i class="fas fa-arrow-up"></i>
  </button>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Load categories
    async function loadCategories() {
      try {
        const response = await fetch('data/categories.json');
        const categories = await response.json();
        const container = document.getElementById('categoriesList');

        container.innerHTML = categories.map((cat, index) => `
          <a href="search.html?category=${cat.id}" class="category-card reveal" style="animation-delay: ${index * 0.1}s">
            <div class="category-icon" style="background: ${cat.color}20; color: ${cat.color};">
              <i class="fas ${cat.icon}"></i>
            </div>
            <div class="category-info">
              <h3>${cat.name}</h3>
              <p>${cat.count} رمز</p>
            </div>
          </a>
        `).join('');

        initScrollReveal();
      } catch (error) {
        console.error('Error loading categories:', error);
      }
    }

    loadCategories();
  </script>
</body>

</html>
